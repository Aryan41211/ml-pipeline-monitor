global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ml-pipeline-monitor'
    environment: 'production'

# Alertmanager configuration (optional - not configured by default)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files:
  # - "alerts/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ML Pipeline Monitor API
  - job_name: 'ml-pipeline-monitor-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 10s
    scrape_timeout: 5s

  # Node Exporter for host-level metrics (optional - run on host)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']

  # cAdvisor for container metrics (optional)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']