version: "3.9"

services:
  app:
    build: .
    container_name: ml-pipeline-monitor
    ports:
      - "8501:8501"
    environment:
      - PIPELINE_DB=/app/data/pipeline_monitor.db
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  api:
    build: .
    container_name: ml-pipeline-monitor-api
    command: ["uvicorn", "services.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - PIPELINE_DB=/app/data/pipeline_monitor.db
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ml-pipeline-monitor-postgres
    profiles: ["postgres"]
    environment:
      - POSTGRES_USER=mlmonitor
      - POSTGRES_PASSWORD=mlmonitor
      - POSTGRES_DB=mlmonitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
